version: '3.8'

services:
  semantic_pg:
    image: postgres:16
    container_name: semantic_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: semantic_ai_mapper
      POSTGRES_USER: semantic_user
      POSTGRES_PASSWORD: semantic_password
    ports:
      - "5432:5432"
    volumes:
      - semantic_pgdata:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: semantic_metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - semantic_pg

  grafana:
    image: grafana/grafana:11.1.0
    container_name: semantic_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - semantic_pg
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  semantic_pgdata:
  grafana_data:
